name: Print Hello world
on:
  push:
jobs:
  print:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Print Hello 
        run: echo "Hello world"

      - name: setup
        uses: actions/checkout@v4

      - name : setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependecis
        run: npm ci 
      
      - name: run test
        run: npm run test 